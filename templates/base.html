<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Portfolio App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Model Portfolio</a>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('index') }}">Comparison</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('investments') }}">Current Investments</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('targets') }}">Target Settings</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('history') }}">History</a>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
